<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <header>
        <h2>Student Portal</h2>
            <nav>
        <ul>
            <li>
                <a href="#">
                    Home
                </a>
            </li>
            <li>
                <a href="#">
                    Courses
                </a>
            </li>
            <li>
                <a href="#">

                </a>
            </li>
            <li>
                <a href="#">

            </li>

    <main>
        
        <section id = "hero">
            <h1>Welcome to the Student Portal</h1>
            <p>
                Manage your courses, profile and grades easily.
            </p>
            <button>
                Explore Courses
            </button>
        </section> 
        <section class="stats">
    
        <div class="stat">
            <h3>3</h3>

        </div>

        </div>

        <section id="courses">

    <h2>Available Courses</h2>

    <!-- Step 40 -->
    <input
        type="text"
        id="search-courses"
        placeholder="Search courses..."
    >

    <!-- Step 42 -->
    <button id="sort-btn">
        Sort by Credits
    </button>

    <!-- Dynamic course cards -->
    <div class="course-grid"></div>

    <!-- Step 39 -->
    <p id="total-credits"></p>

    <!-- Step 43 -->
    <div id="selected-course"></div>

</section>
